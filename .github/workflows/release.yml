name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            dry-run:
                description: Build and validate without creating a release
                type: boolean
                default: true

permissions:
    contents: write

env:
    DRY_RUN: ${{ !(startsWith(github.ref, 'refs/tags/') || inputs.dry-run == 'false') }}

jobs:
    build:
        name: Build binaries
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.7

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Compile binaries
              run: |
                  bun build app/src/cli.ts --compile --target=bun-darwin-arm64  --outfile planderson-darwin-arm64
                  sha256sum planderson-darwin-arm64 > planderson-darwin-arm64.sha256

                  bun build app/src/cli.ts --compile --target=bun-darwin-x64    --outfile planderson-darwin-x64
                  sha256sum planderson-darwin-x64 > planderson-darwin-x64.sha256

                  bun build app/src/cli.ts --compile --target=bun-linux-x64     --outfile planderson-linux-x64
                  sha256sum planderson-linux-x64 > planderson-linux-x64.sha256

                  bun build app/src/cli.ts --compile --target=bun-linux-arm64   --outfile planderson-linux-arm64
                  sha256sum planderson-linux-arm64 > planderson-linux-arm64.sha256

                  bun build app/src/cli.ts --compile --target=bun-windows-x64   --outfile planderson-win32-x64.exe
                  sha256sum planderson-win32-x64.exe > planderson-win32-x64.exe.sha256

            - name: Package plugin
              run: |
                  tar -czf planderson-plugin.tar.gz plugin/

            - name: Package tmux scripts
              run: |
                  tar -czf planderson-tmux.tar.gz \
                    integrations/tmux/init.sh \
                    integrations/tmux/run-and-restore.sh

            - name: Upload artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: release-artifacts
                  path: |
                      planderson-*
                      planderson-plugin.tar.gz
                      planderson-tmux.tar.gz

    release:
        name: Create GitHub Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Download artifacts
              uses: actions/download-artifact@v4
              with:
                  name: release-artifacts
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/*
                  generate_release_notes: true
                  draft: false
                  prerelease: ${{ contains(github.ref, '-') }}
