name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: What happened?
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          placeholder: |
              1. ...
              2. ...
              3. ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
      validations:
          required: true
